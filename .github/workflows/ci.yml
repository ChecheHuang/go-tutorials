# Blog API CI/CD Pipeline
#
# 觸發條件：push 到 main/master，或建立 Pull Request
# 流程：lint → test → build Docker image
# 對應教學：第 30 課 CI/CD

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: "1.23"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──── Job 1: 程式碼品質檢查 ────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Go 環境
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 執行 golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ──── Job 2: 測試 ────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # SQLite 需要 CGO
      - name: 安裝 CGO 依賴
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: 執行單元測試（含 race detection 和覆蓋率）
        run: |
          CGO_ENABLED=1 go test -v -race -coverprofile=coverage.txt -covermode=atomic ./internal/... ./pkg/...

      - name: 上傳測試覆蓋率
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # ──── Job 3: 建構 Docker 映像 ────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: 設定 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 建構 Docker 映像（不推送）
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──── Job 4: 部署到 Staging（僅 push 到 main/master）────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: 登入 Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 設定 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 推送 Docker 映像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

      - name: 部署到 Kubernetes（Staging）
        if: env.KUBECONFIG_STAGING != ''
        run: |
          kubectl set image deployment/blog-api \
            blog-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n blog-staging
          kubectl rollout status deployment/blog-api -n blog-staging --timeout=300s
        env:
          KUBECONFIG_STAGING: ${{ secrets.KUBECONFIG_STAGING }}
