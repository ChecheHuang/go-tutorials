# ⚠️  警告：此檔案僅為範本，請勿直接用於生產環境
#
# base64 是「編碼」不是「加密」— 任何人都能解碼
# 生產環境請使用以下方案之一：
#   1. External Secrets Operator（推薦）
#   2. HashiCorp Vault
#   3. 雲端 Secret Manager（AWS / GCP / Azure）
#
# 產生強密鑰：openssl rand -base64 32
#
apiVersion: v1
kind: Secret
metadata:
  name: blog-api-secrets
  namespace: blog
type: Opaque
data:
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_SECRET  # 部署前必須替換！
