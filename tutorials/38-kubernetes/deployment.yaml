# ==========================================================================
# 第三十八課：Kubernetes 部署
# ==========================================================================
#
# Kubernetes（K8s）核心概念：
#   Pod        → 最小部署單位，包含一個或多個容器
#   Deployment → 管理 Pod 的副本數量和更新策略
#   Service    → 為 Pod 提供穩定的網路端點（負載均衡）
#   ConfigMap  → 非敏感設定（環境變數、設定檔）
#   Secret     → 敏感資訊（密碼、API Key）
#   Ingress    → 對外暴露 HTTP 服務（包含路由規則）
#   HPA        → 水平自動擴展（根據 CPU/記憶體自動增減 Pod）
#
# 使用方式：
#   kubectl apply -f tutorials/36-kubernetes/
#   kubectl get pods -n my-app
#   kubectl logs -f deployment/my-app -n my-app

---
# Namespace：隔離不同環境或應用
apiVersion: v1
kind: Namespace
metadata:
  name: my-app
  labels:
    app: my-app

---
# ConfigMap：非敏感設定
apiVersion: v1
kind: ConfigMap
metadata:
  name: my-app-config
  namespace: my-app
data:
  APP_PORT: "8080"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  DB_DRIVER: "postgres"
  DB_MAX_CONNS: "20"

---
# Secret：敏感資訊（base64 編碼）
# 真實環境用 Vault 或 External Secrets Operator 管理
apiVersion: v1
kind: Secret
metadata:
  name: my-app-secrets
  namespace: my-app
type: Opaque
data:
  # 這些是 base64 編碼，真實環境不要寫在這裡
  # 用 kubectl create secret generic my-app-secrets --from-literal=key=value
  DB_PASSWORD: cGFzc3dvcmQ=      # "password"
  JWT_SECRET: c2VjcmV0LWtleQ==  # "secret-key"

---
# Deployment：管理 Pod 的生命週期
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: my-app
  labels:
    app: my-app
    version: "1.0.0"
spec:
  replicas: 3  # 3 個副本（高可用）

  selector:
    matchLabels:
      app: my-app

  # 更新策略（Rolling Update）
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # 更新時最多額外多幾個 Pod
      maxUnavailable: 0  # 更新時最少保留幾個可用 Pod（0 = 零停機）

  template:
    metadata:
      labels:
        app: my-app
      annotations:
        # Prometheus 自動發現（配合 ServiceMonitor）
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"

    spec:
      # 優雅終止等待時間（Graceful Shutdown）
      terminationGracePeriodSeconds: 30

      # 安全設定
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534  # nobody

      containers:
        - name: my-app
          image: ghcr.io/my-org/my-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080
              name: http

          # 環境變數：從 ConfigMap 讀取
          envFrom:
            - configMapRef:
                name: my-app-config

          # 環境變數：從 Secret 讀取（敏感資訊不放在 ConfigMap）
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: JWT_SECRET

          # 資源限制（Resource Limits）
          # Request：K8s 排程 Pod 時的保證
          # Limit：Pod 的上限（超過會被 OOMKilled）
          resources:
            requests:
              cpu: "100m"     # 0.1 CPU 核心
              memory: "128Mi" # 128 MB
            limits:
              cpu: "500m"     # 0.5 CPU 核心
              memory: "256Mi" # 256 MB

          # Liveness Probe：Pod 是否活著（失敗則重啟）
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10  # 等 10 秒才開始檢查
            periodSeconds: 30        # 每 30 秒檢查一次
            failureThreshold: 3      # 連續失敗 3 次才重啟

          # Readiness Probe：Pod 是否準備好接受流量（失敗則從 Service 移除）
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          # Startup Probe：給慢啟動的服務更多時間
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30  # 最多等 30 * 10s = 5 分鐘
            periodSeconds: 10

---
# Service：為 Pod 提供穩定的網路端點
apiVersion: v1
kind: Service
metadata:
  name: my-app
  namespace: my-app
  labels:
    app: my-app
spec:
  type: ClusterIP  # 只在叢集內部可訪問（對外用 Ingress）
  selector:
    app: my-app    # 選擇有這個 label 的 Pod
  ports:
    - name: http
      port: 80           # Service 端口
      targetPort: 8080   # Pod 端口

---
# Ingress：對外暴露 HTTP 服務
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app
  namespace: my-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # 自動申請 SSL 憑證
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.myapp.example.com
      secretName: my-app-tls
  rules:
    - host: api.myapp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-app
                port:
                  name: http

---
# HorizontalPodAutoscaler：自動水平擴展
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: my-app
  namespace: my-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-app
  minReplicas: 2   # 最少 2 個副本
  maxReplicas: 10  # 最多 10 個副本
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # CPU 超過 70% 就擴展
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80  # 記憶體超過 80% 就擴展
