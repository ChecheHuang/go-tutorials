# ==========================================================================
# GitHub Actions CI/CD 工作流程
# ==========================================================================
#
# 觸發條件：
#   - push 到 main 或 develop 分支
#   - 建立 Pull Request
#
# 工作流程：
#   1. 程式碼品質檢查（lint）
#   2. 測試（unit tests + race detection）
#   3. 建構 Docker 映像
#   4. 部署（只有 push 到 main 時）

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# 環境變數（整個 workflow 共用）
env:
  GO_VERSION: "1.23"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──── Job 1: 程式碼品質 ────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Go 環境
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true  # 快取 Go modules，加速後續步驟

      - name: 執行 golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ──── Job 2: 測試 ────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint  # 必須 lint 通過才執行測試

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 執行單元測試（含 race detection）
        run: |
          go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: 執行整合測試
        run: |
          go test -v -tags=integration -run TestIntegration ./...

      - name: 上傳測試覆蓋率
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}

  # ──── Job 3: 建構 ────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test  # 測試通過才建構

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 建構二進位檔
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-w -s -X main.version=${{ github.sha }}" \
            -o dist/app ./cmd/server

      - name: 建立 Docker 映像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false  # CI 階段只建構，不推送
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ──── Job 4: 部署到 Staging（只有 push 到 main 時）────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging  # 對應 GitHub 環境設定（可設定部署保護規則）

    steps:
      - uses: actions/checkout@v4

      - name: 登入 Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # 自動提供，不需手動設定

      - name: 推送 Docker 映像
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

      - name: 部署到 Kubernetes（Staging）
        run: |
          # 更新 Deployment 的映像版本
          kubectl set image deployment/my-app \
            app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n staging
          # 等待部署完成
          kubectl rollout status deployment/my-app -n staging --timeout=300s
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}

  # ──── Job 5: 部署到 Production（需要手動批准）────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://myapp.example.com  # 顯示在 GitHub 部署記錄

    steps:
      - name: 部署到 Production
        run: |
          kubectl set image deployment/my-app \
            app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n production
          kubectl rollout status deployment/my-app -n production --timeout=300s
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: 部署成功通知
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Production 部署成功: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
